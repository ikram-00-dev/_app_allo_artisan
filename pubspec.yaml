name: allo_artisan_gpt

description: A Flutter app for connecting clients with artisans
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ========================
  # STATE MANAGEMENT & ROUTING
  # ========================
  get: ^4.6.6

  # ========================
  # STORAGE
  # ========================
  shared_preferences: ^2.2.2

  # ========================
  # NETWORKING
  # ========================
  http: ^1.2.2
  dio: ^5.4.0

  # ========================
  # QR CODE
  # ========================
  mobile_scanner: ^5.2.3
  qr_flutter: ^4.1.0  # ← ADD THIS for QR code generation

  # ========================
  # UI / ICONS
  # ========================
  lucide_icons: ^0.257.0

  # ========================
  # DATE / FORMAT
  # ========================
  intl: ^0.19.0

  # ========================
  # IMAGE HANDLING
  # ========================
  image_picker: ^1.0.7
    # Add this for temporary directory access
  path_provider: ^2.1.1

  # ========================
  # PERMISSIONS
  # ========================
  permission_handler: ^11.3.1



  # ========================
  # LOADING ANIMATIONS
  # ========================
  flutter_spinkit: ^5.2.0

  # ========================
  # UI HELPERS
  # ========================
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  image_picker: ^1.0.4
  http: ^1.1.0
  # ... other dependencies
flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/