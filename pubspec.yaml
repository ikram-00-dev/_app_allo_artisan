name: allo_artisan_gpt

description: A Flutter app for connecting clients with artisans
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
dependencies:
  flutter:
    sdk: flutter
  get: ^4.6.6
  shared_preferences: ^2.2.2

  http: ^1.2.2
  dio: ^5.4.0



  # ========================
  # QR CODE SCANNER
  # ========================
  mobile_scanner: ^5.2.3

  # ========================
  # UI / ICONS
  # ========================
  lucide_icons: ^0.257.0

  # ========================
  # DATE / FORMAT
  # ========================
  intl: ^0.19.0

  # ========================
  # IMAGE HANDLING
  # ========================
  image_picker: ^1.0.7

  # ========================
  # PERMISSIONS
  # ========================
  permission_handler: ^11.3.1

  # ========================
  # LOADING ANIMATIONS (optional but nice UI)
  # ========================
  flutter_spinkit: ^5.2.0

  # ========================
  # UI HELPERS
  # ========================
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/